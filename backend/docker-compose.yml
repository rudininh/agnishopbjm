version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_NAME: AgniShopBJM
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: http://localhost
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: agnishop
      DB_USERNAME: agnishop
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSLMODE: prefer
    depends_on:
      - postgres
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    networks:
      - agnishop

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: agnishop
      POSTGRES_USER: agnishop
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agnishop

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - agnishop

volumes:
  postgres_data:

networks:
  agnishop:
    driver: bridge
