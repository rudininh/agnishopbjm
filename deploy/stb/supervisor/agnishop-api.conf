[program:agnishop-api]
process_name=%(program_name)s
directory=/opt/agnishopbjm/backend
command=php artisan serve --host=0.0.0.0 --port=8088
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/opt/agnishopbjm/backend/storage/logs/agnishop-api.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=3
stopwaitsecs=30
